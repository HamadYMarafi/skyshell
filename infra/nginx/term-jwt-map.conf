# /etc/nginx/conf.d/term-jwt-map.conf
# Preflight instrumentation for origin JWT enforcement (docs/ORIGIN-AUTH.md):
# logs WHETHER each request carried a Cloudflare Access JWT (never the token).
# Once /var/log/nginx/term-jwt.log shows jwt=1 on real browser traffic —
# including /ws and /browser/websockify — enforcement is safe to enable.
# WebSocket upgrade map — lives HERE (the always-installed plumbing file), not in
# cockpit.conf, so term-ui.conf works even when the cockpit vhost isn't installed.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

map $http_cf_access_jwt_assertion $term_has_jwt {
    default 1;
    ""      0;
}
log_format jwtprobe '$time_local port=$server_port jwt=$term_has_jwt "$request" $status';
