map $http_upgrade $connection_upgrade { default upgrade; '' close; }
server {
  listen 127.0.0.1:8080;
  server_name _;
  client_max_body_size 200M;

  # Origin-auth parity with the term-ui vhost: /live2/* carries the same
  # snippets/term-ui-auth.conf include (inert "# disabled" until
  # tools/enable-origin-auth.sh flips it), so enabling origin auth protects
  # the cockpit on BOTH hosts at once. auth_request resolves against this
  # same-server internal location.
  location = /_origin_auth {
    internal;
    proxy_pass http://127.0.0.1:7697/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
  }
  location = /__live/inject.js { default_type application/javascript; alias /var/www/skyshell-cockpit/inject.js; add_header Cache-Control "no-store" always; }
  location = /__live/active { default_type text/plain; alias /var/www/skyshell-cockpit/active; add_header Cache-Control "no-store" always; }
  location = /cockpit { default_type text/html; alias /var/www/skyshell-cockpit/index.html; }
  location /live/ {
    proxy_pass http://127.0.0.1:6081/;
    proxy_hide_header X-Frame-Options; proxy_hide_header Content-Security-Policy;
    proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
  }
  # Cockpit v2 — CDP screencast + control bridge (127.0.0.1:8934). Additive; /live/ stays as fallback.
  # Same-origin framing only (the Skyshell panel iframes it) — no cross-site clickjacking.
  location /live2/ {
    include snippets/term-ui-auth.conf;
    proxy_pass http://127.0.0.1:8934/;
    proxy_hide_header X-Frame-Options; proxy_hide_header Content-Security-Policy;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
  }
  # Cockpit v2 WebRTC signaling (SDP/ICE) -> the media server on :8935. Token+Origin gated in-app.
  location /live2/webrtc {
    include snippets/term-ui-auth.conf;
    proxy_pass http://127.0.0.1:8935/;
    proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    proxy_set_header Origin $http_origin;
    proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
  }
  # /homelive/ (Mac-over-Tailscale stream) REMOVED 2026-07-13: dead since the
  # 07-10 repoint to the box's own browser, and its MagicDNS upstream made nginx
  # fail to START at boot until tailscaled's DNS was up (3 failed attempts on
  # the 07-13 reboot drill; would be a permanent outage with Tailscale removed).
  location = /websockify {
    proxy_pass http://127.0.0.1:6081/websockify;
    proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
    proxy_set_header Host $host; proxy_set_header Origin http://$host;
    proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
  }
  location / {
    proxy_pass http://127.0.0.1:7860;
    proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Accept-Encoding ""; proxy_read_timeout 300s; proxy_buffering off;
    proxy_hide_header Cache-Control; add_header Cache-Control "no-store" always;
    sub_filter_once on; sub_filter '</body>' '<script src="/__live/inject.js?v=13"></script></body>';
  }
}
