# term-ui — app vhost (:7690, cloudflared-facing) + agent/emergency vhost (:7695).
# The two server blocks are IDENTICAL except :7690 carries the origin-auth
# includes (inert while snippets/term-ui-auth.conf is empty — flipped by
# tools/enable-origin-auth.sh) and the jwt-presence probe log. Keep them in sync.
server {
    listen 127.0.0.1:7690;
    server_name _;
    root /var/www/term-ui;
    access_log /var/log/nginx/term-jwt.log jwtprobe;

    location = /_origin_auth {
        internal;
        proxy_pass http://127.0.0.1:7697/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = / { include snippets/term-ui-auth.conf; include snippets/term-ui-headers.conf; add_header Cache-Control "no-cache"; try_files /index.html =404; }
    location / { include snippets/term-ui-auth.conf; include snippets/term-ui-headers.conf; add_header Cache-Control "no-cache"; try_files $uri /index.html; }
    location = /favicon.ico { access_log off; expires 1h; try_files /assets/icon-192.png =404; }
    location = /manifest.json { include snippets/term-ui-auth.conf; include snippets/term-ui-headers.conf; }
    location = /sw.js { include snippets/term-ui-auth.conf; include snippets/term-ui-headers.conf; add_header Service-Worker-Allowed "/"; add_header Cache-Control "no-cache"; }
    location /assets/ { include snippets/term-ui-auth.conf; include snippets/term-ui-headers.conf; expires 1h; access_log off; }
    location = /ws {
        include snippets/term-ui-auth.conf;
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s; proxy_send_timeout 3600s;
        proxy_buffering off; proxy_cache off;
    }
    location = /token { include snippets/term-ui-auth.conf; proxy_pass http://127.0.0.1:7681; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /browser/ {
        include snippets/term-ui-auth.conf;
        proxy_pass http://127.0.0.1:6081/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
    # Cockpit v2 (WebRTC live browser) served same-origin so the app can iframe it.
    location /live2/webrtc {
        include snippets/term-ui-auth.conf;
        proxy_pass http://127.0.0.1:8935/;
        proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin $http_origin; proxy_set_header Host $host;
        proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
    }
    location /live2/ {
        include snippets/term-ui-auth.conf;
        proxy_pass http://127.0.0.1:8934/;
        proxy_hide_header X-Frame-Options; proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_send_timeout 86400s; proxy_buffering off;
    }
    location /bctl/ { include snippets/term-ui-auth.conf; proxy_pass http://127.0.0.1:7692; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /stats { include snippets/term-ui-auth.conf; proxy_pass http://127.0.0.1:7691; proxy_http_version 1.1; proxy_set_header Host $host; }
    location = /tabs/lib/upload {
        include snippets/term-ui-auth.conf;
        client_max_body_size 210m;
        proxy_pass http://127.0.0.1:7691;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s; proxy_send_timeout 300s; proxy_request_buffering off;
    }
    location /tabs { include snippets/term-ui-auth.conf; proxy_pass http://127.0.0.1:7691; proxy_http_version 1.1; proxy_set_header Host $host; }
}

# Agent/emergency vhost — NO origin auth (reaching it requires SSH, which is
# already root-equivalent trust). Agents tunnel: ssh -L 8443:127.0.0.1:7695
server {
    listen 127.0.0.1:7695;
    server_name _;
    root /var/www/term-ui;

    location = / { include snippets/term-ui-headers.conf; add_header Cache-Control "no-cache"; try_files /index.html =404; }
