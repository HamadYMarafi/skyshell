# /etc/nginx/snippets/term-ui-headers.conf
# Security headers for the term-ui app shell. Included per-location because
# nginx add_header inheritance stops the moment a location adds its own.
# NOTE: no upgrade-insecure-requests — the agent path loads the app over
# plain http through an SSH tunnel and must keep working.
# CSP matches the recipe long documented in index.html's header comment:
# the app is fully self-contained (no third-party origins), frames only the
# same-origin /browser/ KasmVNC client, and needs inline script/style.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'self'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
