set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g status-interval 3
set -g window-size latest
setw -g aggressive-resize on
bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-Left previous-window
bind -n C-Right next-window
bind -n S-Left previous-window
bind -n S-Right next-window
set -g status off
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour234,fg=colour246"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour183"
set -g message-style "bg=colour236,fg=colour223"
set -g @tb "#[align=centre]#[range=user|kleft]#[bg=colour238]#[fg=colour189] ◀ #[default]#[norange] #[range=user|kup]#[bg=colour238]#[fg=colour189] ▲ #[default]#[norange] #[range=user|kdown]#[bg=colour238]#[fg=colour189] ▼ #[default]#[norange] #[range=user|kright]#[bg=colour238]#[fg=colour189] ▶ #[default]#[norange]  #[range=user|kenter]#[bg=colour151]#[fg=colour235]#[bold] Enter #[default]#[norange] #[range=user|kesc]#[bg=colour216]#[fg=colour235]#[bold] Esc #[default]#[norange] #[range=user|kstab]#[bg=colour111]#[fg=colour235]#[bold] Shft+Tab #[default]#[norange] #[range=user|kctlc]#[bg=colour211]#[fg=colour235]#[bold] ^C #[default]#[norange]"
set -g @lh "#[align=centre]#[fg=colour242]Ctrl+t new tab      ·      Ctrl+←/→ switch tabs      ·      Shift+Tab cycle mode"
set -g status-left "#{?#{<:#{client_width},90},,#[bg=colour183]#[fg=colour235]#[bold] CLAUDE #[default] }"
set -g status-left-length 14
setw -g window-status-style "fg=colour242"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=colour111]#[fg=colour235]#[bold] #I:#W #[default]"
set -g status-right "#[range=user|newtab]#[bg=colour151]#[fg=colour235]#[bold] +New #[default]#[norange] "
set -g status-right-length 8
set -g status-format[1] "#{?#{<:#{client_width},90},#{@tb},#{@lh}}"
bind -T root MouseDown1Status {
  if -F "#{==:#{mouse_status_range},newtab}" { new-window } {
  if -F "#{==:#{mouse_status_range},kup}"    { send-keys Up } {
  if -F "#{==:#{mouse_status_range},kdown}"  { send-keys Down } {
  if -F "#{==:#{mouse_status_range},kleft}"  { send-keys Left } {
  if -F "#{==:#{mouse_status_range},kright}" { send-keys Right } {
  if -F "#{==:#{mouse_status_range},kenter}" { send-keys Enter } {
  if -F "#{==:#{mouse_status_range},kesc}"   { send-keys Escape } {
  if -F "#{==:#{mouse_status_range},kstab}"  { send-keys BTab } {
  if -F "#{==:#{mouse_status_range},kctlc}"  { send-keys C-c } {
  select-window -t= }}}}}}}}}
}

# activity flags feed the web-terminal tab dots + notifications (term-ui v13)
set -g monitor-activity on
set -g visual-activity off

# web-terminal shell: zsh (for the `claude` backend picker) — added 2026-07-15
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# let apps INSIDE tmux (claude, vim) set the outer clipboard via OSC 52 — the
# web terminal decodes it client-side (term-ui v20, 2026-07-18)
set -s set-clipboard on

# Mobile scrollback: touch can't send a wheel event and raw PageUp goes to the
# shell, so tmux history was unreachable on phones. Make the keybar PgUp button
# (sends PageUp) enter copy-mode and scroll; PgUp/PgDn then page through history
# and scrolling to the bottom auto-exits (-e). Passes PageUp through unchanged
# inside full-screen apps (vim/less/claude alt-screen) so their own paging works.
# (term-ui v23, 2026-07-22)
bind -n PageUp if-shell -F '#{alternate_on}' 'send-keys PageUp' 'copy-mode -eu'

# Fine-grained wheel: 1 line per report instead of the 5-line default jumps.
# The web client (term-ui v26) batches + rate-caps wheel reports, so 1-line
# steps give smooth tracking; 5-line jumps read as chunky over the link.
bind -T copy-mode    WheelUpPane   send -X scroll-up
bind -T copy-mode    WheelDownPane send -X scroll-down
bind -T copy-mode-vi WheelUpPane   send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down
